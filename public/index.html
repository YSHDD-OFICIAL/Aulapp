<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEA Biométrico</title>
    
    <!-- Meta tags PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- CSS -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <!-- Iconos -->
    <link rel="icon" type="image/png" href="/assets/icons/favicon.ico">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Loader inicial -->
        <div class="initial-loader">
            <div class="spinner"></div>
            <p>Cargando sistema biométrico CEA...</p>
        </div>
    </div>
    
    <!-- Template para modal biométrico -->
    <template id="biometric-modal-template">
        <div class="modal-overlay">
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <h3 class="modal-title">Verificación Biométrica</h3>
                <div class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary">Cancelar</button>
                    <button class="btn btn-primary" disabled>Verificando...</button>
                </div>
            </div>
        </div>
    </template>
    
    <!-- Scripts -->
    <script src="/js/database.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/biometric.js"></script>
    <script src="/js/heartbeats.js"></script>
    <script src="/js/export.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/app.js"></script>
    
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ Service Worker registrado'))
                .catch(err => console.error('❌ Error registrando SW:', err));
        }
    </script>
</body>
</html>

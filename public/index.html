        <link rel="stylesheet" href="/css/main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Estilos críticos inline para First Paint -->
    <style>
        /* Estilos críticos mínimos para que la página se vea bien inmediatamente */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .initial-loader {
            text-align: center;
            color: white;
            padding: 2rem;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .offline-status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 9999;
            transition: all 0.3s ease;
        }
        
        .offline-status.online {
            background: #4caf50;
            color: white;
        }
        
        .offline-status.offline {
            background: #f44336;
            color: white;
        }
        
        .install-pwa {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: white;
            color: #1e3c72;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9998;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Loader inicial -->
        <div class="initial-loader">
            <div class="spinner"></div>
            <p>Cargando sistema biométrico CEA...</p>
            <small style="opacity: 0.8; margin-top: 1rem; display: block;">Versión 1.0.0</small>
        </div>
    </div>
    
    <!-- Template para modal biométrico -->
    <template id="biometric-modal-template">
        <div class="modal-overlay">
            <div class="modal-content">
                <button class="modal-close">&times;</button>
                <h3 class="modal-title">Verificación Biométrica</h3>
                <div class="modal-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary">Cancelar</button>
                    <button class="btn btn-primary" disabled>Verificando...</button>
                </div>
            </div>
        </div>
    </template>
    
    <!-- Template para toast notifications -->
    <template id="toast-template">
        <div class="toast-notification">
            <div class="toast-icon"></div>
            <div class="toast-content">
                <div class="toast-title"></div>
                <div class="toast-message"></div>
            </div>
            <button class="toast-close">&times;</button>
        </div>
    </template>
    
    <!-- Template para alerta de confirmación -->
    <template id="confirm-template">
        <div class="confirm-overlay">
            <div class="confirm-dialog">
                <h3 class="confirm-title"></h3>
                <p class="confirm-message"></p>
                <div class="confirm-actions">
                    <button class="btn btn-secondary confirm-cancel">Cancelar</button>
                    <button class="btn btn-primary confirm-ok">Aceptar</button>
                </div>
            </div>
        </div>
    </template>
    
    <!-- Scripts críticos - deben cargar rápido -->
    <script>
        // Detectar modo offline inmediatamente
        (function() {
            const isOnline = navigator.onLine;
            const statusDiv = document.createElement('div');
            statusDiv.className = `offline-status ${isOnline ? 'online' : 'offline'}`;
            statusDiv.innerHTML = isOnline ? '🟢 En línea' : '🔴 Sin conexión';
            document.body.appendChild(statusDiv);
            
            window.addEventListener('online', function() {
                statusDiv.className = 'offline-status online';
                statusDiv.innerHTML = '🟢 En línea';
            });
            
            window.addEventListener('offline', function() {
                statusDiv.className = 'offline-status offline';
                statusDiv.innerHTML = '🔴 Sin conexión';
            });
        })();
    </script>
    
    <!-- Scripts diferidos con lazy loading -->
    <script defer src="/js/database.js"></script>
    <script defer src="/js/auth.js"></script>
    <script defer src="/js/biometric.js"></script>
    <script defer src="/js/heartbeats.js"></script>
    <script defer src="/js/export.js"></script>
    <script defer src="/js/validators.js"></script>
    <script defer src="/js/formatters.js"></script>
    <script defer src="/js/offline.js"></script>
    <script defer src="/js/notifications.js"></script>
    <script defer src="/js/charts.js"></script>
    <script defer src="/js/store.js"></script>
    <script defer src="/js/api.js"></script>
    <script defer src="/js/progress-calculator.js"></script>
    
    <!-- Componentes -->
    <script defer src="/js/components/circular-progress.js"></script>
    <script defer src="/js/components/biometric-modal.js"></script>
    <script defer src="/js/components/vehicle-table.js"></script>
    <script defer src="/js/components/student-stepper.js"></script>
    <script defer src="/js/components/heartbeat-indicator.js"></script>
    
    <!-- Router y App (deben cargar al final) -->
    <script defer src="/js/router.js"></script>
    <script defer src="/js/app.js"></script>
    <script defer src="/js/main.js"></script>
    
    <!-- TypeScript compilado (si existe) -->
    <script defer src="/ts/main.js"></script>
    
    <!-- WebAssembly loader -->
    <script defer src="/wasm/loader.js"></script>
    
    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(registration) {
                        console.log('✅ Service Worker registrado con éxito:', registration.scope);
                        
                        // Verificar actualizaciones
                        registration.addEventListener('updatefound', function() {
                            const newWorker = registration.installing;
                            console.log('🔄 Nueva versión del Service Worker detectada');
                            
                            newWorker.addEventListener('statechange', function() {
                                if (newWorker.state === 'installed') {
                                    if (navigator.serviceWorker.controller) {
                                        console.log('🆕 Nueva versión disponible. Recarga para actualizar.');
                                        // Mostrar notificación de actualización
                                        if (window.CEANotifications) {
                                            CEANotifications.send('Actualización disponible', {
                                                body: 'Hay una nueva versión del sistema. Recarga para actualizar.',
                                                tag: 'update-available'
                                            });
                                        }
                                    }
                                }
                            });
                        });
                    })
                    .catch(function(error) {
                        console.error('❌ Error registrando Service Worker:', error);
                    });
                
                // Escuchar mensajes del Service Worker
                navigator.serviceWorker.addEventListener('message', function(event) {
                    console.log('📨 Mensaje del Service Worker:', event.data);
                    
                    if (event.data.type === 'CACHE_UPDATED') {
                        console.log('📦 Cache actualizado:', event.data.url);
                    }
                });
            });
            
            // Sincronización periódica
            navigator.serviceWorker.ready.then(function(registration) {
                if ('periodicSync' in registration) {
                    try {
                        registration.periodicSync.register('sync-heartbeats', {
                            minInterval: 12 * 60 * 60 * 1000 // 12 horas
                        });
                    } catch (error) {
                        console.log('Periodic sync no soportado:', error);
                    }
                }
            });
        }
        
        // Detectar instalación PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Mostrar botón de instalación después de 2 segundos
            setTimeout(() => {
                if (!document.querySelector('.install-pwa')) {
                    const installBtn = document.createElement('button');
                    installBtn.className = 'install-pwa';
                    installBtn.innerHTML = '📱 Instalar App';
                    installBtn.onclick = async () => {
                        if (!deferredPrompt) return;
                        
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        console.log('Resultado instalación:', outcome);
                        
                        deferredPrompt = null;
                        installBtn.remove();
                    };
                    
                    document.body.appendChild(installBtn);
                    
                    // Ocultar después de 30 segundos si no se usa
                    setTimeout(() => {
                        if (installBtn.parentNode) {
                            installBtn.remove();
                        }
                    }, 30000);
                }
            }, 2000);
        });
        
        // Analíticas básicas
        window.addEventListener('load', function() {
            console.log('📊 CEA Biométrico cargado - Versión 1.0.0');
            console.log('🕒 Tiempo de carga:', performance.now().toFixed(0), 'ms');
            
            // Reportar Web Vitals (opcional)
            if ('web-vitals' in window) {
                // Enviar métricas
            }
        });
    </script>
